<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Fruit Cutter AR GPS</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: monospace; }
.overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  background: rgba(0,0,0,0.9); color:white; text-align:center; z-index: 100;
}
.btn { padding:16px 32px; margin-top:20px; font-size:18px; border:none; border-radius:10px; cursor:pointer; }
.btn-start { background: linear-gradient(135deg,#00ff88,#00aaff); color:black; }
.btn-restart { background: linear-gradient(135deg,#ff4444,#ff8800); color:white; }

#hud { position: fixed; top:10px; left:10px; font-size:22px; color:cyan; z-index:10; }
</style>
</head>
<body>

<div id="hud">SCORE: 0</div>

<div id="screen-start" class="overlay">
  <h2>🍎 FRUIT CUTTER AR</h2>
  <p>Нажмите START, чтобы запустить AR</p>
  <button class="btn btn-start" onclick="requestPermissions()">START AR</button>
</div>

<div id="screen-gameover" class="overlay" style="display:none;">
  <h2>💥 GAME OVER</h2>
  <p id="final-score">SCORE: 0</p>
  <button class="btn btn-restart" onclick="restartGame()">RESTART</button>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false">

  <a-assets>
    <a-asset-item id="fruitModel" src="assets/fruit.glb"></a-asset-item>
    <a-asset-item id="bombModel" src="assets/bomb.glb"></a-asset-item>
    <audio id="snd-cut" src="assets/cut.mp3" preload="auto"></audio>
    <audio id="snd-bomb" src="assets/bomb.mp3" preload="auto"></audio>
  </a-assets>

  <a-entity camera look-controls>
    <a-entity id="cursor" cursor="rayOrigin: entity" raycaster="objects: .enemy"
              position="0 0 -1"
              geometry="primitive:ring;radiusInner:0.015;radiusOuter:0.025"
              material="color: yellow; shader: flat; opacity:0.7">
    </a-entity>
  </a-entity>

</a-scene>

<script>
let GAME = { state:'menu', score:0, lat:0, lon:0 };
let spawnInterval = null;

// --- Запрос разрешений: камера + GPS ---
function requestPermissions() {
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos => {
      GAME.lat = pos.coords.latitude;
      GAME.lon = pos.coords.longitude;
      startAR();
    }, err=>{
      alert("Невозможно получить GPS. Используются координаты по умолчанию.");
      GAME.lat = 55.768236; // Москва, пример
      GAME.lon = 37.502719;
      startAR();
    }, { enableHighAccuracy:true });
  } else {
    alert("Геолокация не поддерживается, будут использованы координаты по умолчанию.");
    GAME.lat = 55.768236;
    GAME.lon = 37.502719;
    startAR();
  }
}

// --- Старт игры AR ---
function startAR() {
  document.getElementById('screen-start').style.display='none';
  GAME.state='playing';
  GAME.score=0;
  updateHUD();
  startSpawner();
}

// --- Преобразование метров в градусы ---
function offsetLatLon(lat, lon, northM, eastM) {
  const dLat = northM / 111320;
  const dLon = eastM / (111320 * Math.cos(lat*Math.PI/180));
  return { lat: lat+dLat, lon: lon+dLon };
}

// --- Спавн фруктов и бомб относительно GPS ---
function startSpawner() {
  if(spawnInterval) clearInterval(spawnInterval);
  spawnInterval = setInterval(spawnObject, 1500);
}

function spawnObject() {
  if(GAME.state!=='playing') return;
  const scene = document.querySelector('a-scene');
  if(!scene) return;

  const type = Math.random()<0.8?'fruit':'bomb';

  // Случайное смещение 0-3 метра
  const offsetX = (Math.random()-0.5)*6;
  const offsetZ = -3 - Math.random()*2;

  const entity = document.createElement('a-entity');
  entity.setAttribute('class', 'enemy '+type);
  entity.setAttribute('gltf-model', type==='fruit'?'#fruitModel':'#bombModel');
  entity.setAttribute('scale', '0.3 0.3 0.3');

  // Позиция относительно GPS (преобразуем метры в координаты)
  const pos = offsetLatLon(GAME.lat, GAME.lon, 0, 0);
  entity.setAttribute('position', `${offsetX} 2 ${offsetZ}`);

  // Анимация падения
  entity.setAttribute('animation__fall', `property: position; to:${offsetX} -2 ${offsetZ}; dur:4000; easing:linear`);
  scene.appendChild(entity);

  // Если объект долетает до земли
  setTimeout(()=>{
    if(entity.parentNode && GAME.state==='playing'){
      if(type==='bomb') endGame();
      entity.parentNode.removeChild(entity);
    }
  },4100);
}

// --- Стрельба / нарезка ---
document.addEventListener('click', shoot);
document.addEventListener('touchstart', shoot);

function shoot() {
  if(GAME.state!=='playing') return;
  const cursor = document.querySelector('#cursor');
  if(!cursor || !cursor.components.raycaster) return;
  const hits = cursor.components.raycaster.intersectedEls;
  if(hits.length>0){
    const target = hits[0];
    if(target.classList.contains('fruit')){
      GAME.score+=10;
      updateHUD();
      document.querySelector('#snd-cut').play();
      target.parentNode.removeChild(target);
    } else if(target.classList.contains('bomb')){
      document.querySelector('#snd-bomb').play();
      endGame();
    }
  }
}

function updateHUD() {
  document.getElementById('hud').textContent='SCORE: '+GAME.score;
}

function endGame() {
  GAME.state='gameover';
  clearInterval(spawnInterval);
  spawnInterval=null;
  document.getElementById('final-score').textContent='SCORE: '+GAME.score;
  document.getElementById('screen-gameover').style.display='flex';
  document.querySelectorAll('.enemy').forEach(el=>{
    if(el.parentNode) el.parentNode.removeChild(el);
  });
}

function restartGame() {
  GAME.state='playing';
  GAME.score=0;
  updateHUD();
  document.getElementById('screen-gameover').style.display='none';
  startSpawner();
}
</script>

</body>
</html>
