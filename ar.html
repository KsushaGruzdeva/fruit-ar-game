<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden; font-family:sans-serif;">

<!-- СТАРТОВЫЙ ЭКРАН -->
<div id="startScreen" style="
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:linear-gradient(black, #222);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
text-align:center;
padding:20px;
">

  <h1>🍉 Fruit Slice AR</h1>

  <p style="max-width:300px;">
    🎯 Режь фрукты, нажимая на них<br>
    💣 Не трогай бомбы<br>
    ❗ Пропустишь фрукт — проиграешь
  </p>

  <button onclick="startGame()" style="
    margin-top:20px;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4d4d;
    color:white;">
    ▶ START
  </button>

</div>

<!-- HUD -->
<div id="hud" style="
position:fixed;
top:10px;
left:10px;
color:white;
font-size:22px;
z-index:5;
text-shadow:0 0 5px black;">
Score: <span id="score">0</span>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.8);
color:white;
z-index:20;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
">

  <h1>💀 GAME OVER</h1>
  <p id="finalScore"></p>

  <button onclick="restartGame()" style="
    margin-top:20px;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;">
    🔄 PLAY AGAIN
  </button>

</div>

<a-scene
  embedded
  arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
>

  <!-- КАМЕРА -->
  <a-camera>
    <a-cursor
      fuse="false"
      rayOrigin="mouse"
      raycaster="objects: .fruit, .bomb">
    </a-cursor>
  </a-camera>

</a-scene>

<script>
let score = 0;
let gameActive = false;

// СТАРТ
function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  score = 0;
  document.getElementById('score').innerText = score;
  gameActive = true;
  spawnLoop();
}

// ПЕРЕЗАПУСК
function restartGame() {
  location.reload();
}

// СПАВН ЦИКЛ
function spawnLoop() {
  if (!gameActive) return;

  spawnObject();
  setTimeout(spawnLoop, 1200);
}

// СОЗДАНИЕ ОБЪЕКТОВ
function spawnObject() {
  const scene = document.querySelector('a-scene');

  let isBomb = Math.random() < 0.2;

  let obj = document.createElement('a-entity');

  let x = (Math.random() - 0.5) * 2;
  let y = Math.random() * 2 + 0.5;
  let z = -3;

  obj.setAttribute('position', `${x} ${y} ${z}`);
  obj.setAttribute('scale', '0.5 0.5 0.5');

  if (isBomb) {
    obj.setAttribute('gltf-model', 'assets/bomb.glb');
    obj.setAttribute('class', 'bomb');
  } else {
    obj.setAttribute('gltf-model', 'assets/fruit.glb');
    obj.setAttribute('class', 'fruit');
  }

  // АНИМАЦИЯ
  obj.setAttribute('animation', {
    property: 'position',
    to: `${x} ${y + 1.5} ${z}`,
    dur: 2000
  });

  // КЛИК
  obj.addEventListener('click', () => {
    if (!gameActive) return;

    if (obj.classList.contains('fruit')) {
      sliceEffect(obj.getAttribute('position'));
      score++;
      document.getElementById('score').innerText = score;
      obj.remove();
    }

    if (obj.classList.contains('bomb')) {
      gameOver();
    }
  });

  scene.appendChild(obj);

  // ПРОПУСК = ПРОИГРЫШ
  setTimeout(() => {
    if (obj.parentNode && gameActive) {
      obj.remove();
      gameOver();
    }
  }, 2500);
}

// ЭФФЕКТ
function sliceEffect(pos) {
  const scene = document.querySelector('a-scene');

  for (let i = 0; i < 6; i++) {
    let part = document.createElement('a-sphere');

    part.setAttribute('radius', '0.05');
    part.setAttribute('color', 'red');
    part.setAttribute('position', pos);

    part.setAttribute('animation', {
      property: 'position',
      to: `${pos.x + (Math.random()-0.5)} ${pos.y + Math.random()} ${pos.z}`,
      dur: 800
    });

    scene.appendChild(part);

    setTimeout(() => part.remove(), 800);
  }
}

// GAME OVER
function gameOver() {
  gameActive = false;

  document.getElementById('finalScore').innerText =
    "Score: " + score;

  document.getElementById('gameOverScreen').style.display = 'flex';
}
</script>

</body>
</html>
